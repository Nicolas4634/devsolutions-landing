services:
  - type: web
    name: nexo-digital
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY
        sync: false
